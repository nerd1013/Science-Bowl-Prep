<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Science Bowl AI Coach</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#060b18;font-family:'Syne',sans-serif;color:#e2e8f0;overflow:hidden;}
  ::-webkit-scrollbar{width:4px;background:#0d1526;}
  ::-webkit-scrollbar-thumb{background:#1e3055;border-radius:2px;}
  .app{display:flex;height:100vh;}
  .sidebar{width:215px;background:#08101f;border-right:1px solid #1a2d4a;display:flex;flex-direction:column;padding:22px 0;flex-shrink:0;}
  .sidebar-logo{padding:0 18px 18px;border-bottom:1px solid #1a2d4a;}
  .logo-title{font-size:17px;font-weight:800;color:#00e5ff;letter-spacing:-0.5px;}
  .logo-sub{font-size:10px;color:#3a5a7a;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .logo-badge{display:inline-block;font-size:8px;background:#0a1e38;color:#00e5ff;border:1px solid #1a3a5a;border-radius:3px;padding:1px 5px;margin-top:5px;letter-spacing:1px;}
  .nav{padding:14px 10px;flex:1;}
  .nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border-radius:8px;margin-bottom:3px;background:none;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:#3a5a7a;transition:all 0.2s;text-align:left;}
  .nav-btn:hover{color:#a0b8d0;background:#0d1a2e;}
  .nav-btn.active{color:#00e5ff;background:#0a1e38;}
  .nav-icon{font-size:15px;width:20px;text-align:center;}
  .weak-box{margin:0 10px 10px;padding:10px 12px;background:#150a05;border:1px solid #6b3015;border-radius:8px;font-size:11px;color:#e07040;}
  .weak-box-title{font-weight:700;margin-bottom:4px;}
  .db-box{margin:0 10px;padding:9px 12px;background:#060e1c;border:1px solid #1a3a5a;border-radius:8px;font-size:10px;color:#3a5a7a;line-height:1.6;}
  .main{flex:1;overflow-y:auto;max-height:100vh;}
  .view{padding:30px 36px;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  .spinner{width:36px;height:36px;border:3px solid #1e3055;border-top-color:#00e5ff;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 14px;}
  .spinner-sm{width:16px;height:16px;border:2px solid #1e3055;border-top-color:#00e5ff;border-radius:50%;animation:spin 0.9s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
  .loading-wrap{text-align:center;padding:70px 0;color:#3a5a7a;font-size:14px;}
  h1.page-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
  .page-sub{color:#3a5a7a;font-size:14px;margin-bottom:28px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .stat-card{background:#0d1526;border:1px solid #1a2d4a;border-radius:12px;padding:20px 22px;}
  .stat-val{font-size:28px;font-weight:800;color:#00e5ff;}
  .stat-label{font-size:10px;color:#3a5a7a;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-top:4px;}
  .section-label{font-size:11px;color:#3a5a7a;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .subj-card{background:#0d1526;border:1px solid #1a2d4a;border-radius:12px;padding:18px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;text-align:left;width:100%;}
  .subj-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,255,0.06);}
  .subj-icon{font-size:26px;margin-bottom:8px;}
  .subj-name{font-weight:700;font-size:13px;}
  .subj-acc{font-size:11px;color:#3a5a7a;margin-top:3px;}
  .bar-bg{height:3px;background:#1a2d4a;border-radius:2px;margin-top:8px;}
  .bar-fill{height:100%;border-radius:2px;transition:width 0.5s;}
  .btn-primary{background:#00e5ff;color:#060b18;border:none;border-radius:8px;padding:10px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
  .btn-primary:hover{background:#33ecff;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
  .btn-ghost{background:#0d1526;color:#a0b8d0;border:1px solid #1a2d4a;border-radius:8px;padding:8px 16px;font-family:'Syne',sans-serif;font-weight:600;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .btn-ghost:hover{border-color:#00e5ff;color:#00e5ff;}
  .btn-ghost.sel{border-color:#00e5ff;color:#00e5ff;background:#061828;}
  .btn-ghost:disabled{opacity:0.35;cursor:not-allowed;}
  .tag{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;}
  .choice-btn{display:block;width:100%;text-align:left;background:#0d1526;border:1px solid #1a2d4a;border-radius:8px;padding:11px 14px;font-family:'Space Mono',monospace;font-size:12px;color:#e2e8f0;cursor:pointer;margin-bottom:7px;transition:all 0.15s;}
  .choice-btn:hover:not(:disabled){border-color:#00e5ff;background:#061828;}
  .choice-btn.correct{border-color:#4ade80;background:#031508;color:#4ade80;}
  .choice-btn.wrong{border-color:#f87171;background:#180303;color:#f87171;}
  .choice-btn:disabled{cursor:default;}
  .q-box{background:#0d1526;border:1px solid #1a2d4a;border-radius:12px;padding:22px 26px;margin-bottom:18px;font-family:'Space Mono',monospace;font-size:13px;line-height:1.8;}
  .sa-input{width:100%;padding:12px 14px;background:#0d1526;border:2px solid #1a3a5a;border-radius:8px;color:#e2e8f0;font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;margin-bottom:10px;}
  .sa-input:focus{border-color:#00e5ff;}
  .flip-card{background:#0d1526;border:1px solid #1a2d4a;border-radius:16px;padding:50px 36px;text-align:center;cursor:pointer;min-height:180px;display:flex;flex-direction:column;justify-content:center;transition:all 0.3s;max-width:580px;margin:0 auto;}
  .flip-card.flipped{border-color:#00e5ff;background:#061828;}
  .flip-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;}
  .flip-text{font-family:'Space Mono',monospace;font-size:14px;line-height:1.6;}
  .flip-topic{font-size:10px;color:#3a5a7a;margin-top:14px;}
  .prog-bar-wrap{margin-bottom:20px;}
  .prog-row{display:flex;justify-content:space-between;font-size:11px;color:#3a5a7a;margin-bottom:5px;}
  .prog-bg{height:3px;background:#1a2d4a;border-radius:2px;}
  .prog-fill{height:100%;background:#a3e635;border-radius:2px;transition:width 0.3s;}
  .lesson-section{background:#0d1526;border:1px solid #1a2d4a;border-radius:12px;padding:22px;margin-bottom:14px;}
  .lesson-h{font-size:15px;font-weight:700;color:#00e5ff;margin-bottom:10px;}
  .lesson-p{font-size:13px;line-height:1.75;color:#8aaccc;}
  .term-chip{background:#060e1c;border:1px solid #1a2d4a;border-radius:5px;padding:4px 9px;font-size:11px;color:#a3e635;display:inline-block;margin:3px;}
  .pq-item{background:#080f1c;border-radius:8px;padding:12px 14px;margin-bottom:10px;}
  .pq-q{font-family:'Space Mono',monospace;font-size:12px;margin-bottom:8px;}
  .pq-a{color:#4ade80;font-size:12px;font-family:'Space Mono',monospace;}
  .input-field{width:100%;padding:11px 14px;background:#0d1526;border:1px solid #1a2d4a;border-radius:8px;color:#e2e8f0;font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
  .input-field:focus{border-color:#00e5ff;}
  .stat-row{display:flex;align-items:center;gap:14px;margin-bottom:11px;}
  .stat-row-icon{width:22px;text-align:center;}
  .stat-row-name{width:115px;font-size:13px;font-weight:600;}
  .stat-row-bar{flex:1;height:6px;background:#1a2d4a;border-radius:3px;}
  .stat-row-pct{width:52px;font-size:12px;font-family:'Space Mono',monospace;text-align:right;}
  .stat-row-count{width:56px;font-size:11px;color:#3a5a7a;text-align:right;}
  .ai-plan{background:#0d1526;border:1px solid #1a2d4a;border-radius:12px;padding:22px;max-width:580px;}
  .ai-plan-title{font-size:14px;font-weight:700;color:#00e5ff;margin-bottom:10px;}
  .ai-plan-text{font-size:13px;line-height:1.75;color:#8aaccc;white-space:pre-wrap;}
  .result-box{padding:14px 18px;border-radius:10px;margin-bottom:14px;}
  .result-box.ok{background:#031508;border:1px solid #1a5c28;}
  .result-box.fail{background:#180303;border:1px solid #7c1212;}
  .result-box.timeout{background:#0d0a00;border:1px solid #7a5a00;}
  .result-title{font-weight:700;font-size:13px;margin-bottom:6px;}
  .result-text{font-size:12px;line-height:1.7;color:#8aaccc;white-space:pre-wrap;}
  .answer-reveal{font-family:'Space Mono',monospace;font-size:14px;color:#4ade80;font-weight:700;padding:8px 0 4px;}
  .timer{font-size:30px;font-weight:800;font-family:'Space Mono',monospace;color:#00e5ff;}
  .timer.urgent{color:#f87171;animation:pulse 0.5s infinite;}
  .bonus-box{background:#060e1c;border:1px solid #1a3a5a;border-radius:10px;padding:16px 18px;margin-top:14px;}
  .bonus-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#3a5a7a;margin-bottom:8px;}
  .source-chip{font-size:9px;color:#2a4a6a;background:#06101e;border:1px solid #12253a;padding:2px 7px;border-radius:4px;font-family:'Space Mono',monospace;}
  .flex-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .flex-row-sb{display:flex;justify-content:space-between;align-items:center;}
  .mt8{margin-top:8px;} .mt16{margin-top:16px;} .mt24{margin-top:24px;}
  .mb12{margin-bottom:12px;} .mb20{margin-bottom:20px;} .mb28{margin-bottom:28px;}
  .review-badge{font-size:9px;color:#e07040;font-weight:700;background:#150a05;padding:2px 6px;border-radius:4px;border:1px solid #6b3015;}
  .weak-alert{padding:10px 14px;background:#150a05;border:1px solid #6b3015;border-radius:8px;font-size:12px;color:#e07040;margin-bottom:18px;}
  .study-tip{padding:14px 18px;background:#061828;border:1px solid #1a2d4a;border-radius:10px;font-size:12px;color:#8aaccc;margin-top:14px;}
  .study-tip strong{color:#00e5ff;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
//  Science Bowl AI Coach v2
//  Real DOE questions: SciBowlDB public API — scibowldb.com (no key needed)
//  AI coaching: Anthropic API (no key needed when running inside Claude.ai)
// ─────────────────────────────────────────────────────────────────────────────

const MODEL = "claude-sonnet-4-20250514";

const SUBJECTS = [
  {id:"Biology",      icon:"🧬", hue:"#4ade80", dbCats:["BIOLOGY"]},
  {id:"Chemistry",    icon:"⚗️", hue:"#fb923c", dbCats:["CHEMISTRY"]},
  {id:"Physics",      icon:"⚡", hue:"#38bdf8", dbCats:["PHYSICS"]},
  {id:"Earth & Space",icon:"🌌", hue:"#a78bfa", dbCats:["EARTH AND SPACE","EARTH SCIENCE","ASTRONOMY"]},
  {id:"Math",         icon:"∑",  hue:"#f472b6", dbCats:["MATH"]},
  {id:"Energy",       icon:"⚛️", hue:"#fbbf24", dbCats:["ENERGY"]},
];

// ─── AI (no API key needed inside Claude.ai) ─────────────────────────────────
async function callClaude(system, user) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:MODEL, max_tokens:1000, system,
        messages:[{role:"user",content:user}]})
    });
    const d = await res.json();
    return d.content?.[0]?.text ?? "";
  } catch(e) { return ""; }
}

async function callJSON(system, user) {
  const raw = await callClaude(
    system + "\n\nRESPOND WITH VALID JSON ONLY. No markdown, no backticks, no preamble.", user);
  try { return JSON.parse(raw.replace(/```(?:json)?|```/g,"").trim()); }
  catch { return null; }
}

// ─── SciBowlDB (7,291 real DOE questions, free public API) ───────────────────
async function fetchSciBowlQuestion(subject) {
  const subj = SUBJECTS.find(s => s.id === subject);
  if (!subj) return null;
  const cat = subj.dbCats[Math.floor(Math.random() * subj.dbCats.length)];
  try {
    const res = await fetch("https://scibowldb.com/api/questions/random", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({categories:[cat]})
    });
    const d = await res.json();
    return parseSciBowlQ(d.question);
  } catch(e) { return null; }
}

function parseSciBowlQ(raw) {
  if (!raw) return null;
  const isMC = raw.tossup_format === "Multiple Choice";
  let qText = (raw.tossup_question || "")
    .replace(/^[A-Z][A-Z\s&]+?(Multiple Choice|Short Answer)\s*/i, "").trim();
  let options = null, answer = null;

  if (isMC) {
    // Split out W) X) Y) Z) options embedded in question text
    const m = qText.match(/(W\)[\s\S]*?)(X\)[\s\S]*?)(Y\)[\s\S]*?)(Z\)[\s\S]*)$/);
    if (m) {
      qText = qText.slice(0, m.index).trim();
      options = {
        W: m[1].replace(/^W\)\s*/,"").trim(),
        X: m[2].replace(/^X\)\s*/,"").trim(),
        Y: m[3].replace(/^Y\)\s*/,"").trim(),
        Z: m[4].replace(/^Z\)\s*/,"").trim(),
      };
    }
    const lm = (raw.tossup_answer||"").trim().match(/^([WXYZ])/);
    answer = lm ? lm[1] : (raw.tossup_answer||"")[0];
  }

  return {
    id: raw.id,
    category: raw.category,
    source: raw.source,
    format: isMC ? "Multiple Choice" : "Short Answer",
    question: qText,
    options,
    answer: isMC ? answer : (raw.tossup_answer||"").replace(/^[WXYZ]\)\s*/,"").trim(),
    bonusQ: (raw.bonus_question||"").replace(/^[A-Z][A-Z\s&]+?(Multiple Choice|Short Answer)\s*/i,"").trim(),
    bonusA: (raw.bonus_answer||"").replace(/^[WXYZ]\)\s*/,"").trim(),
  };
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  view:"dashboard",
  history:[],
  pr:{subj:null,q:null,loading:false,selected:null,saInput:"",revealed:false,explanation:null,timeLeft:0,score:{c:0,t:0}},
  fc:{subj:null,cards:[],idx:0,flipped:false,loading:false,known:new Set()},
  ls:{subj:"Biology",goal:"",lesson:null,loading:false},
  st:{plan:null,loading:false},
};
let timerInterval = null;

function pct(c,t){return t?Math.round(c/t*100):null;}
function getStats(){
  const s={};
  SUBJECTS.forEach(sub=>s[sub.id]={c:0,t:0});
  state.history.forEach(h=>{if(s[h.subject]){s[h.subject].t++;if(h.correct)s[h.subject].c++;}});
  return s;
}
function getWeak(stats){
  return SUBJECTS.filter(s=>{const st=stats[s.id];return st.t>=2&&pct(st.c,st.t)<60;}).map(s=>s.id);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const stats=getStats(),weak=getWeak(stats);
  document.getElementById("root").innerHTML=buildApp(stats,weak);
  attachHandlers(stats,weak);
}

function buildApp(stats,weak){
  return `<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">Science Bowl</div>
      <div class="logo-sub">AI Coach</div>
      <div class="logo-badge">7,291 DOE QUESTIONS</div>
    </div>
    <nav class="nav">
      ${[{id:"dashboard",icon:"🏠",label:"Dashboard"},{id:"practice",icon:"⚡",label:"Practice Round"},
         {id:"flashcards",icon:"🃏",label:"Flashcards"},{id:"lesson",icon:"📖",label:"Lessons"},
         {id:"stats",icon:"📊",label:"My Stats"}]
        .map(n=>`<button class="nav-btn${state.view===n.id?" active":""}" data-nav="${n.id}">
          <span class="nav-icon">${n.icon}</span>${n.label}</button>`).join("")}
    </nav>
    ${weak.length?`<div class="weak-box"><div class="weak-box-title">⚠ Needs Review</div>
      ${weak.map(w=>`<div style="opacity:.75;font-size:10px;margin-top:2px">${w}</div>`).join("")}</div>`:""}
    <div class="db-box">Source: SciBowlDB<br>7,291 official DOE<br>question pairs • free API</div>
  </aside>
  <main class="main">${buildView(stats,weak)}</main>
  </div>`;
}

function buildView(stats,weak){
  switch(state.view){
    case"dashboard":  return buildDashboard(stats,weak);
    case"practice":   return buildPractice(stats);
    case"flashcards": return buildFlashcards();
    case"lesson":     return buildLesson(weak);
    case"stats":      return buildStats(stats,weak);
    default:return"";
  }
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function buildDashboard(stats,weak){
  const totalQ=state.history.length,totalC=state.history.filter(h=>h.correct).length;
  const overall=pct(totalC,totalQ);
  return `<div class="view">
  <h1 class="page-title">Welcome back, <span style="color:#00e5ff">Scholar</span></h1>
  <p class="page-sub">Powered by 7,291 official DOE Science Bowl questions + AI coaching. No sign-in required.</p>
  <div class="grid3 mb28">
    <div class="stat-card"><div class="stat-val">${totalQ||"—"}</div><div class="stat-label">Questions Answered</div></div>
    <div class="stat-card"><div class="stat-val">${overall!=null?overall+"%":"—"}</div><div class="stat-label">Overall Accuracy</div></div>
    <div class="stat-card"><div class="stat-val" style="${weak.length?"color:#fb923c":""}">${weak.length||"🎉"}</div><div class="stat-label">Weak Areas</div></div>
  </div>
  <div class="section-label mb12">Subjects</div>
  <div class="grid3 mb28">
    ${SUBJECTS.map(s=>{
      const st=stats[s.id],p=pct(st.c,st.t),isW=weak.includes(s.id);
      return `<div class="subj-card" data-nav="practice" style="border:1px solid ${isW?"#6b3015":"#1a2d4a"}">
        <div class="flex-row-sb"><div class="subj-icon">${s.icon}</div>${isW?`<span class="review-badge">REVIEW</span>`:""}</div>
        <div class="subj-name" style="color:${s.hue}">${s.id}</div>
        ${p!=null?`<div class="bar-bg mt8"><div class="bar-fill" style="width:${p}%;background:${s.hue}"></div></div>
          <div class="subj-acc" style="color:${s.hue}">${p}% accuracy</div>`
        :`<div class="subj-acc">No data yet</div>`}
      </div>`;
    }).join("")}
  </div>
  <div class="section-label mb12">Quick Start</div>
  <div class="flex-row">
    <button class="btn-primary" data-nav="practice">⚡ Practice Round</button>
    <button class="btn-ghost" data-nav="lesson">📖 Generate Lesson</button>
    <button class="btn-ghost" data-nav="flashcards">🃏 Flashcards</button>
  </div>
  </div>`;
}

// ─── PRACTICE ─────────────────────────────────────────────────────────────────
function buildPractice(stats){
  const pr=state.pr;
  if(!pr.subj) return buildSubjectPicker("practice",stats);
  const subj=SUBJECTS.find(s=>s.id===pr.subj);
  const answered=pr.selected!==null||pr.revealed;
  let body="";

  if(!pr.q&&!pr.loading){
    body=`<div style="text-align:center;padding:60px 0">
      <div style="font-size:56px;margin-bottom:16px">${subj.icon}</div>
      <p style="color:#3a5a7a;font-size:14px;margin-bottom:6px">Real questions from the DOE official question sets.</p>
      <p style="color:#2a4a6a;font-size:12px;font-family:'Space Mono',monospace;margin-bottom:28px">Multiple Choice → 5s timer &nbsp;·&nbsp; Short Answer → type your response</p>
      <button class="btn-primary" id="startQ" style="font-size:15px;padding:13px 36px">⚡ Start Question</button>
    </div>`;
  } else if(pr.loading){
    body=`<div class="loading-wrap"><div class="spinner"></div>Fetching official DOE question…</div>`;
  } else if(pr.q){
    const q=pr.q,isMC=(q.format==="Multiple Choice");
    body=`<div>
      <div class="flex-row-sb mb20">
        <div class="flex-row">
          <span class="tag" style="background:#061828;border:1px solid #1a2d4a;color:#00e5ff">${q.format}</span>
          <span class="tag" style="background:#061828;border:1px solid #1a2d4a;color:#3a5a7a">${q.category}</span>
          <span class="source-chip">${q.source||""}</span>
        </div>
        ${!answered&&isMC&&pr.timeLeft>0?`<div class="timer${pr.timeLeft<=2?" urgent":""}">${pr.timeLeft}s</div>`:""}
      </div>
      <div class="q-box">${q.question}</div>
      ${isMC&&q.options
        ?Object.entries(q.options).map(([k,v])=>{
            let cls="choice-btn";
            if(answered){if(k===q.answer)cls+=" correct";else if(k===pr.selected)cls+=" wrong";}
            return `<button class="${cls}" ${answered?"disabled":""} data-choice="${k}"><b>${k})</b> ${v}</button>`;
          }).join("")
        :!answered
          ?`<input class="sa-input" id="saInput" placeholder="Type your answer and press Enter…" value="${pr.saInput||""}"/>
            <div class="flex-row">
              <button class="btn-primary" id="submitSA">Submit Answer</button>
              <button class="btn-ghost" id="skipSA">Skip / Reveal</button>
            </div>`
          :""}
      ${answered?buildExplanation(q):""}
    </div>`;
  }

  return `<div class="view">
  <div class="flex-row-sb mb28">
    <div class="flex-row">
      <button class="btn-ghost" id="backSubj">← Back</button>
      <span style="font-size:20px">${subj.icon}</span>
      <h1 style="font-size:20px;font-weight:800;color:${subj.hue}">${pr.subj}</h1>
    </div>
    <div style="font-size:13px;color:#3a5a7a">Session: <span style="color:#4ade80;font-weight:700">${pr.score.c}</span>/${pr.score.t}</div>
  </div>
  ${body}
  </div>`;
}

function buildExplanation(q){
  const pr=state.pr,isMC=(q.format==="Multiple Choice");
  let ok,cls,title;
  if(pr.revealed){ok=false;cls="timeout";title="👁 Answer Revealed";}
  else if(pr.selected==="TIMEOUT"){ok=false;cls="timeout";title="⏰ Time's Up!";}
  else{
    ok=isMC?(pr.selected===q.answer):checkSA(pr.selected,q.answer);
    cls=ok?"ok":"fail";title=ok?"✓ Correct!":"✗ Incorrect";
  }
  return `<div class="result-box ${cls} mt16">
    <div class="result-title" style="color:${ok?"#4ade80":cls==="timeout"?"#fbbf24":"#f87171"}">${title}</div>
    <div class="answer-reveal">Correct: ${isMC?q.answer+") "+(q.options?.[q.answer]||""):q.answer}</div>
    ${pr.explanation
      ?`<div class="result-text mt8">${pr.explanation}</div>`
      :`<div class="result-text" style="color:#3a5a7a;margin-top:8px"><span class="spinner-sm"></span>AI is explaining…</div>`}
  </div>
  ${q.bonusQ?`<div class="bonus-box">
    <div class="bonus-label">Bonus Question</div>
    <div style="font-family:'Space Mono',monospace;font-size:12px;line-height:1.7;margin-bottom:8px">${q.bonusQ}</div>
    <button class="btn-ghost" id="showBonus" style="font-size:11px">Show Bonus Answer</button>
    <div id="bonusAns" style="display:none;color:#a3e635;font-family:'Space Mono',monospace;font-size:12px;margin-top:8px">→ ${q.bonusA}</div>
  </div>`:""}
  <div class="flex-row mt16">
    <button class="btn-primary" id="nextQ">Next Question →</button>
  </div>`;
}

function checkSA(given,correct){
  if(!given||!correct) return false;
  const n=s=>s.toLowerCase().replace(/[^a-z0-9]/g,"");
  const g=n(given),c=n(correct);
  return g===c||c.includes(g)||(g.length>3&&c.startsWith(g));
}

function buildSubjectPicker(mode,stats){
  return `<div class="view">
  <h1 class="page-title">${mode==="practice"?"Practice Round":"Flashcards"}</h1>
  <p class="page-sub">${mode==="practice"
    ?"Real DOE questions fetched live. MC: 5-second timer. Short Answer: type your response."
    :"AI-generated flashcards on key Science Bowl topics."}</p>
  <div class="grid3" style="max-width:560px">
    ${SUBJECTS.map(s=>{
      const st=stats?.[s.id],p=st?pct(st.c,st.t):null;
      return `<button class="subj-card" data-pick="${s.id}">
        <div class="subj-icon">${s.icon}</div>
        <div class="subj-name" style="color:${s.hue}">${s.id}</div>
        <div class="subj-acc">${p!=null?p+"% accuracy":"Not started"}</div>
      </button>`;
    }).join("")}
  </div>
  ${mode==="practice"?`<button class="btn-ghost mt16" id="randSubj">🎲 Random Subject</button>`:""}
  </div>`;
}

// ─── FLASHCARDS ───────────────────────────────────────────────────────────────
function buildFlashcards(){
  const fc=state.fc;
  if(!fc.subj) return buildSubjectPicker("flashcards",null);
  const subj=SUBJECTS.find(s=>s.id===fc.subj);
  const card=fc.cards[fc.idx];
  const progress=fc.cards.length?Math.round(fc.known.size/fc.cards.length*100):0;
  let body="";

  if(fc.loading){
    body=`<div class="loading-wrap"><div class="spinner"></div>Generating flashcards…</div>`;
  } else if(card){
    body=`<div class="prog-bar-wrap">
      <div class="prog-row"><span>Card ${fc.idx+1} of ${fc.cards.length}</span><span>${progress}% mastered</span></div>
      <div class="prog-bg"><div class="prog-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="flip-card${fc.flipped?" flipped":""}" id="flipCard">
      ${fc.flipped
        ?`<div class="flip-label" style="color:#00e5ff">Answer</div>
          <div class="flip-text" style="color:#00e5ff">${card.back}</div>`
        :`<div class="flip-label" style="color:#3a5a7a">Question — tap to reveal</div>
          <div class="flip-text">${card.front}</div>
          <div class="flip-topic">${card.topic||""}</div>`}
    </div>
    <div class="flex-row mt24" style="justify-content:center;gap:12px">
      <button class="btn-ghost" id="fcWrong" style="color:#f87171;border-color:#7c1212">✗ Still Learning</button>
      <button class="btn-ghost" id="fcRight" style="color:#4ade80;border-color:#1a5c28">✓ Got It</button>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="btn-ghost" id="fcRegen" style="font-size:11px">↻ New Set</button>
    </div>`;
  } else {
    body=`<div class="loading-wrap" style="color:#f87171">Could not generate cards.
      <div style="margin-top:12px"><button class="btn-ghost" id="fcRegen">Retry</button></div></div>`;
  }

  return `<div class="view">
  <div class="flex-row mb28">
    <button class="btn-ghost" id="fcBack">← Back</button>
    <span style="font-size:20px">${subj.icon}</span>
    <h1 style="font-size:20px;font-weight:800;color:${subj.hue}">${fc.subj} Flashcards</h1>
    <span style="margin-left:auto;font-size:12px;color:#3a5a7a">${fc.known.size}/${fc.cards.length} mastered</span>
  </div>
  ${body}
  </div>`;
}

// ─── LESSON ───────────────────────────────────────────────────────────────────
function buildLesson(weak){
  const ls=state.ls;
  let body="";
  if(ls.loading){
    body=`<div class="loading-wrap"><div class="spinner"></div>Building your personalized lesson…</div>`;
  } else if(!ls.lesson){
    body=`<div style="max-width:500px">
      <div class="mb20">
        <div class="section-label mb12">Subject</div>
        <div class="flex-row" style="gap:7px">
          ${SUBJECTS.map(s=>`<button class="btn-ghost${ls.subj===s.id?" sel":""}" data-ls-subj="${s.id}">${s.icon} ${s.id}</button>`).join("")}
        </div>
      </div>
      <div class="mb20">
        <div class="section-label mb12">Your Goal <span style="color:#1a2d4a;font-weight:400">(optional)</span></div>
        <input class="input-field" id="goalInput" value="${ls.goal}" placeholder="e.g. Understand thermodynamics, master stoichiometry…"/>
      </div>
      ${weak.length?`<div class="weak-alert">⚠ Based on your practice, consider: <strong>${weak.join(", ")}</strong></div>`:""}
      <button class="btn-primary" id="genLesson" ${!ls.subj?"disabled":""}>📖 Generate Lesson</button>
    </div>`;
  } else {
    const l=ls.lesson;
    body=`<div style="max-width:680px">
      <div class="flex-row-sb mb20">
        <div>
          <h2 style="font-size:22px;font-weight:800">${l.title||""}</h2>
          <p style="color:#00e5ff;font-size:13px;margin-top:5px">${l.objective||""}</p>
        </div>
        <button class="btn-ghost" id="newLesson">New Lesson</button>
      </div>
      ${(l.sections||[]).map(sec=>`<div class="lesson-section">
        <div class="lesson-h">${sec.heading}</div>
        <p class="lesson-p">${sec.content}</p>
        ${sec.keyTerms?.length?`<div style="margin-top:12px">${sec.keyTerms.map(t=>`<span class="term-chip">${t}</span>`).join("")}</div>`:""}
      </div>`).join("")}
      ${l.practiceQuestions?.length?`<div class="lesson-section" style="border-color:#1a5c28">
        <div class="lesson-h">Practice Questions</div>
        ${l.practiceQuestions.map((pq,i)=>`<div class="pq-item">
          <div class="pq-q">${pq.q}</div>
          <div id="pq-${i}" style="display:none" class="pq-a">→ ${pq.a}</div>
          <button class="btn-ghost" style="font-size:11px;padding:4px 10px" data-show-pq="${i}">Show Answer</button>
        </div>`).join("")}
      </div>`:""}
      ${l.studyTip?`<div class="study-tip">💡 <strong>Study Tip:</strong> ${l.studyTip}</div>`:""}
    </div>`;
  }
  return `<div class="view">
  <h1 class="page-title">AI Lessons</h1>
  <p class="page-sub">Personalized lessons tailored to your goals and weak areas.</p>
  ${body}
  </div>`;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function buildStats(stats,weak){
  const totalQ=state.history.length,totalC=state.history.filter(h=>h.correct).length,st=state.st;
  return `<div class="view">
  <h1 class="page-title">My Stats</h1>
  <p class="page-sub">Track your performance across all subjects.</p>
  <div class="grid2 mb28" style="max-width:460px">
    <div class="stat-card"><div class="stat-val">${totalQ||0}</div><div class="stat-label">Questions Answered</div></div>
    <div class="stat-card"><div class="stat-val">${pct(totalC,totalQ)!=null?pct(totalC,totalQ)+"%":"—"}</div><div class="stat-label">Overall Accuracy</div></div>
  </div>
  <div class="section-label mb12">By Subject</div>
  <div style="max-width:560px;margin-bottom:28px">
    ${SUBJECTS.map(s=>{
      const sst=stats[s.id],p=pct(sst.c,sst.t),isW=weak.includes(s.id);
      return `<div class="stat-row">
        <div class="stat-row-icon">${s.icon}</div>
        <div class="stat-row-name" style="color:${isW?"#fb923c":"#e2e8f0"}">${s.id}</div>
        <div class="stat-row-bar"><div class="bar-fill" style="width:${p||0}%;background:${isW?"#fb923c":s.hue}"></div></div>
        <div class="stat-row-pct" style="color:${p==null?"#3a5a7a":isW?"#fb923c":s.hue}">${p!=null?p+"%":"—"}</div>
        <div class="stat-row-count">${sst.t?sst.c+"/"+sst.t:"No data"}</div>
      </div>`;
    }).join("")}
  </div>
  ${!st.plan&&!st.loading?`<button class="btn-primary" id="getAIPlan" ${totalQ===0?"disabled":""}>🤖 Get AI Study Plan</button>
    ${totalQ===0?`<p style="font-size:12px;color:#3a5a7a;margin-top:8px">Answer some questions to unlock your plan.</p>`:""}`:""} 
  ${st.loading?`<div style="color:#3a5a7a;font-size:13px;display:flex;align-items:center;gap:10px">
    <div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0"></div>Analyzing your performance…</div>`:""}
  ${st.plan?`<div class="ai-plan">
    <div class="ai-plan-title">🤖 Your Personalized Study Plan</div>
    <div class="ai-plan-text">${st.plan}</div>
    <button class="btn-ghost mt16" id="refreshPlan" style="font-size:11px">↻ Refresh Plan</button>
  </div>`:""}
  </div>`;
}

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
function attachHandlers(stats,weak){
  document.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click",()=>{state.view=el.dataset.nav;render();});
  });

  const backSubj=document.getElementById("backSubj");
  if(backSubj) backSubj.addEventListener("click",()=>{
    clearInterval(timerInterval);
    state.pr={subj:null,q:null,loading:false,selected:null,saInput:"",revealed:false,explanation:null,timeLeft:0,score:{c:0,t:0}};
    render();
  });

  document.querySelectorAll("[data-pick]").forEach(el=>{
    el.addEventListener("click",()=>{
      const subj=el.dataset.pick;
      if(state.view==="practice"){state.pr.subj=subj;render();}
      else{state.fc.subj=subj;genFlashcards(subj);}
    });
  });

  const randSubj=document.getElementById("randSubj");
  if(randSubj) randSubj.addEventListener("click",()=>{
    state.pr.subj=SUBJECTS[Math.floor(Math.random()*SUBJECTS.length)].id;render();
  });

  const startQ=document.getElementById("startQ");
  if(startQ) startQ.addEventListener("click",genQuestion);
  const nextQ=document.getElementById("nextQ");
  if(nextQ) nextQ.addEventListener("click",genQuestion);

  document.querySelectorAll(".choice-btn").forEach(el=>{
    el.addEventListener("click",()=>handleMC(el.dataset.choice));
  });

  const saInput=document.getElementById("saInput");
  if(saInput){
    saInput.addEventListener("input",e=>state.pr.saInput=e.target.value);
    saInput.addEventListener("keydown",e=>{if(e.key==="Enter")handleSA();});
    setTimeout(()=>saInput.focus(),50);
  }
  const submitSA=document.getElementById("submitSA");
  if(submitSA) submitSA.addEventListener("click",handleSA);
  const skipSA=document.getElementById("skipSA");
  if(skipSA) skipSA.addEventListener("click",()=>{
    clearInterval(timerInterval);
    state.pr.revealed=true;
    state.pr.score.t++;
    state.history.push({subject:state.pr.subj,correct:false,topic:state.pr.q?.category});
    render();fetchExplanation();
  });

  const showBonus=document.getElementById("showBonus");
  if(showBonus) showBonus.addEventListener("click",()=>{
    document.getElementById("bonusAns").style.display="block";
    showBonus.style.display="none";
  });

  const fcBack=document.getElementById("fcBack");
  if(fcBack) fcBack.addEventListener("click",()=>{
    state.fc={subj:null,cards:[],idx:0,flipped:false,loading:false,known:new Set()};render();
  });
  const flipCard=document.getElementById("flipCard");
  if(flipCard) flipCard.addEventListener("click",()=>{state.fc.flipped=!state.fc.flipped;render();});
  const fcRight=document.getElementById("fcRight");
  if(fcRight) fcRight.addEventListener("click",()=>{
    state.fc.known.add(state.fc.idx);state.fc.flipped=false;
    state.fc.idx=(state.fc.idx+1)%state.fc.cards.length;render();
  });
  const fcWrong=document.getElementById("fcWrong");
  if(fcWrong) fcWrong.addEventListener("click",()=>{
    state.fc.known.delete(state.fc.idx);state.fc.flipped=false;
    state.fc.idx=(state.fc.idx+1)%state.fc.cards.length;render();
  });
  const fcRegen=document.getElementById("fcRegen");
  if(fcRegen) fcRegen.addEventListener("click",()=>genFlashcards(state.fc.subj));

  document.querySelectorAll("[data-ls-subj]").forEach(el=>{
    el.addEventListener("click",()=>{state.ls.subj=el.dataset.lsSubj;render();});
  });
  const goalInput=document.getElementById("goalInput");
  if(goalInput) goalInput.addEventListener("input",e=>state.ls.goal=e.target.value);
  const genLesson=document.getElementById("genLesson");
  if(genLesson) genLesson.addEventListener("click",doGenLesson);
  const newLesson=document.getElementById("newLesson");
  if(newLesson) newLesson.addEventListener("click",()=>{state.ls.lesson=null;render();});
  document.querySelectorAll("[data-show-pq]").forEach(el=>{
    el.addEventListener("click",()=>{
      document.getElementById(`pq-${el.dataset.showPq}`).style.display="block";
      el.style.display="none";
    });
  });

  const getAIPlan=document.getElementById("getAIPlan");
  if(getAIPlan) getAIPlan.addEventListener("click",()=>doGetPlan(stats,weak));
  const refreshPlan=document.getElementById("refreshPlan");
  if(refreshPlan) refreshPlan.addEventListener("click",()=>{state.st.plan=null;doGetPlan(stats,weak);});
}

// ─── PRACTICE LOGIC ───────────────────────────────────────────────────────────
async function genQuestion(){
  clearInterval(timerInterval);
  state.pr={...state.pr,q:null,loading:true,selected:null,saInput:"",revealed:false,explanation:null,timeLeft:0};
  render();
  const q=await fetchSciBowlQuestion(state.pr.subj);
  if(q){
    state.pr.q=q;state.pr.loading=false;
    if(q.format==="Multiple Choice"){
      state.pr.timeLeft=5;render();
      timerInterval=setInterval(()=>{
        state.pr.timeLeft--;
        if(state.pr.timeLeft<=0){clearInterval(timerInterval);if(state.pr.selected===null)handleMC("TIMEOUT");return;}
        render();
      },1000);
    } else { render(); }
  } else { state.pr.loading=false;render(); }
}

async function handleMC(choice){
  if(state.pr.selected!==null) return;
  clearInterval(timerInterval);
  const q=state.pr.q,ok=(choice===q?.answer);
  state.pr.selected=choice;
  state.pr.score={c:state.pr.score.c+(ok?1:0),t:state.pr.score.t+1};
  state.history.push({subject:state.pr.subj,correct:ok,topic:q?.category});
  render();fetchExplanation();
}

async function handleSA(){
  const q=state.pr.q,given=state.pr.saInput.trim();
  if(!given) return;
  clearInterval(timerInterval);
  const ok=checkSA(given,q?.answer);
  state.pr.selected=given;
  state.pr.score={c:state.pr.score.c+(ok?1:0),t:state.pr.score.t+1};
  state.history.push({subject:state.pr.subj,correct:ok,topic:q?.category});
  render();fetchExplanation();
}

async function fetchExplanation(){
  const q=state.pr.q;if(!q) return;
  const exp=await callClaude(
    "You are a Science Bowl coach. Explain answers concisely and accurately.",
    `Question: ${q.question}\nCorrect answer: ${q.answer}\nExplain why this is the correct answer in 2-3 sentences.`
  );
  state.pr.explanation=exp;render();
}

// ─── FLASHCARD LOGIC ──────────────────────────────────────────────────────────
async function genFlashcards(subj){
  state.fc={subj,cards:[],idx:0,flipped:false,loading:true,known:new Set()};render();
  const result=await callJSON(
    "You are a Science Bowl flashcard generator.",
    `Generate 10 Science Bowl flashcards for: ${subj}.
     Include key facts, formulas, definitions, and laws commonly tested in Science Bowl.
     Return a JSON array only: [{"front":"...","back":"...","topic":"..."},...]`
  );
  state.fc.cards=Array.isArray(result)?result:[];
  state.fc.loading=false;render();
}

// ─── LESSON LOGIC ─────────────────────────────────────────────────────────────
async function doGenLesson(){
  state.ls.loading=true;state.ls.lesson=null;render();
  const l=await callJSON(
    "You are an expert Science Bowl tutor. Create structured, accurate, exam-focused lessons.",
    `Create a Science Bowl lesson for: ${state.ls.subj}
     Student goal: "${state.ls.goal||"improve overall understanding"}"
     Return JSON: {"title":"...","objective":"By the end of this lesson, you will…",
     "sections":[{"heading":"...","content":"2-3 paragraphs","keyTerms":["Term: def",...]},...],
     "practiceQuestions":[{"q":"...","a":"..."},...],
     "studyTip":"..."}`
  );
  state.ls.lesson=l;state.ls.loading=false;render();
}

// ─── STATS LOGIC ──────────────────────────────────────────────────────────────
async function doGetPlan(stats,weak){
  state.st.loading=true;state.st.plan=null;render();
  const statsText=SUBJECTS.map(s=>{
    const st=stats[s.id];return `${s.id}: ${st.c}/${st.t} (${pct(st.c,st.t)??0}%)`;
  }).join(", ");
  const plan=await callClaude(
    "You are a Science Bowl coach. Give numbered, specific, actionable study advice.",
    `Stats: ${statsText}\nWeak: ${weak.join(", ")||"none"}\nWrite a 3-point numbered study plan under 150 words, specific to Science Bowl format.`
  );
  state.st.plan=plan;state.st.loading=false;render();
}

render();
</script>
