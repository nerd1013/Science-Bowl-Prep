<script>
  async function getInference(input) {
    const response = await fetch('https://api-inference.huggingface.co/models/gpt2', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ inputs: input })
    });
    const data = await response.json();
    return data;
  }
  
  document.getElementById('yourButtonId').addEventListener('click', async () => {
    const input = document.getElementById('yourInputFieldId').value;
    const result = await getInference(input);
    document.getElementById('output').innerText = result.generated_text;
  });
</script>
